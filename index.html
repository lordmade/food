<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Vynix Eats | Premium Delivery</title>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
    <script src="https://unpkg.com/lucide@latest"></script>
    <style>
        :root {
            --bg: #f8f9fa;
            --surface: #ffffff;
            --surface2: #f1f3f5;
            --border: #e9ecef;
            --text: #1a1d23;
            --dim: #6c757d;
            --accent: #06C167; /* Uber Green */
            --accent-dark: #05a357;
            --yellow: #ffc107;
            --danger: #ff3b30;
            --radius: 24px;
            --shadow: 0 10px 30px rgba(0,0,0,0.04);
            --transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
        }

        * { box-sizing: border-box; margin: 0; padding: 0; }
        
        body {
            font-family: 'Plus Jakarta Sans', sans-serif;
            background: var(--bg);
            color: var(--text);
            line-height: 1.5;
            overflow-x: hidden;
        }

        /* Utility */
        .no-scrollbar::-webkit-scrollbar { display: none; }
        .glass { background: rgba(255, 255, 255, 0.8); backdrop-filter: blur(12px); }

        /* HEADER */
        .header {
            display: flex; justify-content: space-between; align-items: center;
            padding: 0 5%; height: 80px;
            background: var(--surface);
            position: sticky; top: 0; z-index: 1000;
            border-bottom: 1px solid var(--border);
        }

        .logo { font-weight: 800; font-size: 1.5rem; letter-spacing: -1px; }
        .logo span { color: var(--accent); }

        .header-actions { display: flex; items-center: center; gap: 15px; }

        .cart-btn {
            background: var(--text); color: white; border: none;
            padding: 12px 20px; border-radius: 100px;
            font-weight: 700; display: flex; align-items: center; gap: 8px;
            cursor: pointer; transition: var(--transition);
        }
        .cart-btn:hover { transform: translateY(-2px); box-shadow: 0 5px 15px rgba(0,0,0,0.2); }
        .cart-count { background: var(--accent); color: white; padding: 2px 8px; border-radius: 10px; font-size: 0.75rem; }

        /* SEARCH & FILTERS */
        .search-section { padding: 20px 5%; background: var(--surface); }
        .search-input-wrapper {
            position: relative; max-width: 600px; margin: 0 auto;
        }
        .search-input {
            width: 100%; padding: 16px 20px 16px 50px;
            background: var(--surface2); border: none; border-radius: 18px;
            font-size: 1rem; outline: none; transition: var(--transition);
        }
        .search-input:focus { background: white; box-shadow: 0 0 0 3px rgba(6, 193, 103, 0.1); }
        .search-icon { position: absolute; left: 18px; top: 50%; transform: translateY(-50%); color: var(--dim); }

        .filters-wrap { padding: 10px 5% 25px; background: var(--surface); border-bottom: 1px solid var(--border); }
        .filters-scroll { display: flex; gap: 12px; overflow-x: auto; padding-bottom: 5px; }
        
        .cat-btn {
            flex: 0 0 auto; padding: 12px 24px; border-radius: 100px;
            background: var(--surface2); border: 1px solid transparent;
            font-weight: 700; color: var(--dim); cursor: pointer;
            transition: var(--transition); display: flex; align-items: center; gap: 8px;
        }
        .cat-btn.active { background: var(--accent); color: white; }
        .cat-btn:hover:not(.active) { background: var(--border); color: var(--text); }

        /* MAIN CONTENT */
        .main { padding: 40px 5%; }
        .section-title { font-size: 1.5rem; font-weight: 800; margin-bottom: 25px; }

        /* RESTAURANT CARDS */
        .restaurants-grid {
            display: grid; grid-template-columns: repeat(auto-fill, minmax(320px, 1fr)); gap: 30px;
        }
        .r-card {
            background: var(--surface); border-radius: var(--radius);
            overflow: hidden; cursor: pointer; transition: var(--transition);
            box-shadow: var(--shadow); border: 1px solid var(--border);
        }
        .r-card:hover { transform: translateY(-8px); border-color: var(--accent); box-shadow: 0 20px 40px rgba(0,0,0,0.08); }
        
        .r-img-wrap { position: relative; height: 200px; }
        .r-img-wrap img { width: 100%; height: 100%; object-fit: cover; }
        .r-eta {
            position: absolute; bottom: 15px; right: 15px;
            background: rgba(255,255,255,0.9); backdrop-filter: blur(5px);
            padding: 6px 12px; border-radius: 12px; font-weight: 700; font-size: 0.85rem;
        }

        .r-info { padding: 20px; }
        .r-name { font-size: 1.1rem; font-weight: 800; margin-bottom: 5px; }
        .r-meta { color: var(--dim); font-size: 0.9rem; font-weight: 500; }

        /* CART DRAWER */
        .cart-drawer {
            position: fixed; right: 0; top: 0; bottom: 0; width: 400px; max-width: 100%;
            background: var(--surface); z-index: 2000; transform: translateX(100%);
            transition: var(--transition); display: flex; flex-direction: column;
            box-shadow: -10px 0 50px rgba(0,0,0,0.1);
        }
        .cart-drawer.open { transform: translateX(0); }
        .cart-header { padding: 25px; border-bottom: 1px solid var(--border); display: flex; justify-content: space-between; align-items: center; }
        .cart-body { flex: 1; overflow-y: auto; padding: 25px; }
        .cart-footer { padding: 25px; border-top: 1px solid var(--border); }
        
        .checkout-btn {
            width: 100%; background: var(--accent); color: white; border: none;
            padding: 18px; border-radius: 18px; font-weight: 800; font-size: 1rem;
            cursor: pointer; transition: var(--transition);
        }
        .checkout-btn:disabled { background: var(--border); cursor: not-allowed; }

        /* TOAST */
        #toast {
            position: fixed; bottom: 30px; left: 50%; transform: translateX(-50%) translateY(100px);
            background: var(--text); color: white; padding: 15px 30px; border-radius: 15px;
            z-index: 3000; transition: var(--transition); font-weight: 600;
        }
        #toast.show { transform: translateX(-50%) translateY(0); }

        /* MOBILE */
        @media (max-width: 768px) {
            .cart-drawer { width: 100%; }
            .header { height: 70px; }
            .restaurants-grid { grid-template-columns: 1fr; }
        }
    </style>
</head>
<body>

    <div id="toast">Item added to cart!</div>

    <header class="header">
        <div class="logo">VYNIX<span>EATS</span></div>
        <div class="header-actions">
            <button class="cart-btn" onclick="toggleCart()">
                <i data-lucide="shopping-bag"></i>
                <span class="cart-count" id="cartCount">0</span>
            </button>
            <button class="cart-btn" style="background: var(--surface2); color: var(--text);" onclick="showToast('Profile coming soon!')">
                <i data-lucide="user"></i>
            </button>
        </div>
    </header>

    <div class="search-section">
        <div class="search-input-wrapper">
            <i data-lucide="search" class="search-icon"></i>
            <input type="text" class="search-input" placeholder="Search for food or restaurants..." oninput="handleSearch(this.value)">
        </div>
    </div>

    <div class="filters-wrap">
        <div class="filters-scroll no-scrollbar">
            <button class="cat-btn active" onclick="filterCategory('all', this)">🍽️ All</button>
            <button class="cat-btn" onclick="filterCategory('burgers', this)">🍔 Burgers</button>
            <button class="cat-btn" onclick="filterCategory('pizza', this)">🍕 Pizza</button>
            <button class="cat-btn" onclick="filterCategory('sushi', this)">🍣 Sushi</button>
            <button class="cat-btn" onclick="filterCategory('healthy', this)">🥗 Healthy</button>
            <button class="cat-btn" onclick="filterCategory('desserts', this)">🍰 Desserts</button>
        </div>
    </div>

    <main class="main">
        <h2 class="section-title">Popular Near You</h2>
        <div class="restaurants-grid" id="restaurantsGrid">
            </div>
    </main>

    <div class="cart-drawer" id="cartDrawer">
        <div class="cart-header">
            <h3 style="font-weight: 800;">My Order</h3>
            <button onclick="toggleCart()" style="background: none; border: none; cursor: pointer;"><i data-lucide="x"></i></button>
        </div>
        <div class="cart-body" id="cartBody">
            </div>
        <div class="cart-footer">
            <div style="display: flex; justify-content: space-between; margin-bottom: 20px;">
                <span style="color: var(--dim); font-weight: 600;">Subtotal</span>
                <span id="cartTotal" style="font-weight: 800; font-size: 1.2rem;">R 0.00</span>
            </div>
            <button class="checkout-btn" id="checkoutBtn" disabled onclick="showToast('Processing Order...')">Checkout</button>
        </div>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js";
        import { getDatabase, ref, get } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-database.js";

        // Your specific config
        const firebaseConfig = {
            apiKey: "AIzaSyAxBT0oESoL62oz_x_Z8cMtdENWZPx4tMI",
            authDomain: "pinotp-d7ef5.firebaseapp.com",
            databaseURL: "https://pinotp-d7ef5-default-rtdb.firebaseio.com",
            projectId: "pinotp-d7ef5",
            storageBucket: "pinotp-d7ef5.firebasestorage.app",
            appId: "1:708458917827:web:375de278577df0adcf9776"
        };

        const app = initializeApp(firebaseConfig);
        const db = getDatabase(app);
        
        // State
        let allVendors = [];
        let cart = [];
        let currentFilter = 'all';

        // --- Logic ---
        async function loadData() {
            try {
                const snapshot = await get(ref(db, 'vendors'));
                if (snapshot.exists()) {
                    allVendors = Object.values(snapshot.val());
                    renderRestaurants(allVendors);
                } else {
                    // Fallback Demo Data if DB is empty
                    allVendors = [
                        { id: 1, name: 'Burger Queen', category: 'burgers', cuisine: 'American', deliveryFee: 15, eta: '20-30', rating: 4.8, image: 'https://images.unsplash.com/photo-1571091718767-18b5b1457add?q=80&w=1000' },
                        { id: 2, name: 'Pizza Palace', category: 'pizza', cuisine: 'Italian', deliveryFee: 10, eta: '15-25', rating: 4.5, image: 'https://images.unsplash.com/photo-1513104890138-7c749659a591?q=80&w=1000' },
                        { id: 3, name: 'Sushi Zen', category: 'sushi', cuisine: 'Japanese', deliveryFee: 25, eta: '30-40', rating: 4.9, image: 'https://images.unsplash.com/photo-1579871494447-9811cf80d66c?q=80&w=1000' }
                    ];
                    renderRestaurants(allVendors);
                }
            } catch (e) {
                console.error(e);
            }
        }

        window.renderRestaurants = (data) => {
            const grid = document.getElementById('restaurantsGrid');
            grid.innerHTML = data.map(v => `
                <div class="r-card" onclick="addToCart('${v.name}', 50)">
                    <div class="r-img-wrap">
                        <img src="${v.image}" alt="${v.name}">
                        <div class="r-eta">${v.eta} min</div>
                    </div>
                    <div class="r-info">
                        <div style="display: flex; justify-content: space-between; align-items: start;">
                            <h4 class="r-name">${v.name}</h4>
                            <span style="font-weight: 700; color: var(--yellow);">★ ${v.rating}</span>
                        </div>
                        <p class="r-meta">${v.cuisine} • Delivery: R${v.deliveryFee}</p>
                    </div>
                </div>
            `).join('');
        };

        window.filterCategory = (cat, btn) => {
            document.querySelectorAll('.cat-btn').forEach(b => b.classList.remove('active'));
            btn.classList.add('active');
            const filtered = cat === 'all' ? allVendors : allVendors.filter(v => v.category === cat);
            renderRestaurants(filtered);
        };

        window.handleSearch = (val) => {
            const filtered = allVendors.filter(v => v.name.toLowerCase().includes(val.toLowerCase()));
            renderRestaurants(filtered);
        };

        window.addToCart = (name, price) => {
            cart.push({ name, price });
            updateCartUI();
            showToast(`Added ${name} to order!`);
        };

        function updateCartUI() {
            const body = document.getElementById('cartBody');
            const count = document.getElementById('cartCount');
            const totalEl = document.getElementById('cartTotal');
            const btn = document.getElementById('checkoutBtn');

            count.innerText = cart.length;
            const total = cart.reduce((sum, item) => sum + item.price, 0);
            totalEl.innerText = `R ${total.toFixed(2)}`;
            btn.disabled = cart.length === 0;

            if (cart.length === 0) {
                body.innerHTML = '<p style="text-align: center; color: var(--dim); margin-top: 50px;">Your cart is empty</p>';
            } else {
                body.innerHTML = cart.map((item, i) => `
                    <div style="display: flex; justify-content: space-between; margin-bottom: 15px; background: var(--surface2); padding: 15px; border-radius: 15px;">
                        <div>
                            <p style="font-weight: 700;">${item.name}</p>
                            <p style="font-size: 0.8rem; color: var(--dim);">Standard Size</p>
                        </div>
                        <p style="font-weight: 800; color: var(--accent);">R${item.price}</p>
                    </div>
                `).join('');
            }
        }

        window.toggleCart = () => document.getElementById('cartDrawer').classList.toggle('open');

        window.showToast = (msg) => {
            const t = document.getElementById('toast');
            t.innerText = msg;
            t.classList.add('show');
            setTimeout(() => t.classList.remove('show'), 3000);
        };

        // Initialize Lucide Icons
        lucide.createIcons();
        loadData();
    </script>
</body>
</html>
