<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Vynix Eats | Premium Delivery</title>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
    <script src="https://unpkg.com/lucide@latest"></script>
    <style>
        :root {
            --bg: #f8f9fa;
            --surface: #ffffff;
            --surface2: #f1f3f5;
            --border: #e9ecef;
            --text: #1a1d23;
            --dim: #6c757d;
            --accent: #06C167;
            --accent-dark: #05a357;
            --yellow: #ffc107;
            --danger: #ff3b30;
            --radius: 24px;
            --shadow: 0 10px 30px rgba(0,0,0,0.04);
            --transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
        }

        * { box-sizing: border-box; margin: 0; padding: 0; }

        body {
            font-family: 'Plus Jakarta Sans', sans-serif;
            background: var(--bg);
            color: var(--text);
            line-height: 1.5;
            overflow-x: hidden;
        }

        .no-scrollbar::-webkit-scrollbar { display: none; }

        /* HEADER */
        .header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 0 5%;
            height: 80px;
            background: var(--surface);
            position: sticky;
            top: 0;
            z-index: 1000;
            border-bottom: 1px solid var(--border);
        }

        .logo {
            font-weight: 800;
            font-size: 1.75rem;
            letter-spacing: -1px;
        }

        .logo span { color: var(--accent); }

        .header-actions {
            display: flex;
            align-items: center;
            gap: 15px;
        }

        .cart-btn {
            background: var(--text);
            color: white;
            border: none;
            padding: 12px 20px;
            border-radius: 100px;
            font-weight: 700;
            display: flex;
            align-items: center;
            gap: 8px;
            cursor: pointer;
            transition: var(--transition);
        }

        .cart-btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 5px 15px rgba(0,0,0,0.2);
        }

        .cart-count {
            background: var(--accent);
            color: white;
            padding: 2px 8px;
            border-radius: 10px;
            font-size: 0.75rem;
        }

        /* SEARCH & FILTERS */
        .search-section {
            padding: 24px 5% 0;
            background: var(--surface);
        }

        .search-input-wrapper {
            position: relative;
            max-width: 680px;
            margin: 0 auto;
        }

        .search-input {
            width: 100%;
            padding: 16px 20px 16px 52px;
            background: var(--surface2);
            border: none;
            border-radius: 18px;
            font-size: 1rem;
            outline: none;
            transition: var(--transition);
        }

        .search-input:focus {
            background: white;
            box-shadow: 0 0 0 3px rgba(6, 193, 103, 0.12);
        }

        .search-icon {
            position: absolute;
            left: 20px;
            top: 50%;
            transform: translateY(-50%);
            color: var(--dim);
            font-size: 1.3rem;
        }

        .filters-wrap {
            padding: 20px 5% 30px;
            background: var(--surface);
            border-bottom: 1px solid var(--border);
        }

        .filters-scroll {
            display: flex;
            gap: 12px;
            overflow-x: auto;
            padding-bottom: 8px;
        }

        .cat-btn {
            flex: 0 0 auto;
            padding: 12px 24px;
            border-radius: 100px;
            background: var(--surface2);
            border: 1px solid transparent;
            font-weight: 700;
            color: var(--dim);
            cursor: pointer;
            transition: var(--transition);
            display: flex;
            align-items: center;
            gap: 8px;
            white-space: nowrap;
        }

        .cat-btn.active {
            background: var(--accent);
            color: white;
        }

        .cat-btn:hover:not(.active) {
            background: var(--border);
            color: var(--text);
        }

        /* MAIN CONTENT */
        .main { padding: 40px 5%; }

        .section-title {
            font-size: 1.6rem;
            font-weight: 800;
            margin-bottom: 28px;
        }

        /* RESTAURANT CARDS */
        .restaurants-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(320px, 1fr));
            gap: 30px;
        }

        .r-card {
            background: var(--surface);
            border-radius: var(--radius);
            overflow: hidden;
            cursor: pointer;
            transition: var(--transition);
            box-shadow: var(--shadow);
            border: 1px solid var(--border);
        }

        .r-card:hover {
            transform: translateY(-8px);
            border-color: var(--accent);
            box-shadow: 0 20px 40px rgba(0,0,0,0.08);
        }

        .r-img-wrap {
            position: relative;
            height: 200px;
        }

        .r-img-wrap img {
            width: 100%;
            height: 100%;
            object-fit: cover;
            transition: transform 0.4s;
        }

        .r-card:hover .r-img-wrap img {
            transform: scale(1.06);
        }

        .r-eta {
            position: absolute;
            bottom: 15px;
            right: 15px;
            background: rgba(255,255,255,0.92);
            backdrop-filter: blur(6px);
            padding: 6px 14px;
            border-radius: 12px;
            font-weight: 700;
            font-size: 0.85rem;
        }

        .r-info {
            padding: 20px;
        }

        .r-name {
            font-size: 1.15rem;
            font-weight: 800;
            margin-bottom: 6px;
        }

        .r-meta {
            color: var(--dim);
            font-size: 0.92rem;
            font-weight: 500;
        }

        /* CART DRAWER */
        .cart-drawer {
            position: fixed;
            right: 0;
            top: 0;
            bottom: 0;
            width: 400px;
            max-width: 100%;
            background: var(--surface);
            z-index: 2000;
            transform: translateX(100%);
            transition: var(--transition);
            display: flex;
            flex-direction: column;
            box-shadow: -10px 0 50px rgba(0,0,0,0.12);
        }

        .cart-drawer.open { transform: translateX(0); }

        .cart-header {
            padding: 25px;
            border-bottom: 1px solid var(--border);
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .cart-body {
            flex: 1;
            overflow-y: auto;
            padding: 25px;
        }

        .cart-footer {
            padding: 25px;
            border-top: 1px solid var(--border);
        }

        .checkout-btn {
            width: 100%;
            background: var(--accent);
            color: white;
            border: none;
            padding: 18px;
            border-radius: 18px;
            font-weight: 800;
            font-size: 1.05rem;
            cursor: pointer;
            transition: var(--transition);
        }

        .checkout-btn:hover {
            background: var(--accent-dark);
            transform: translateY(-2px);
        }

        .checkout-btn:disabled {
            background: var(--border);
            cursor: not-allowed;
        }

        /* TOAST */
        #toast {
            position: fixed;
            bottom: 30px;
            left: 50%;
            transform: translateX(-50%) translateY(100px);
            background: var(--text);
            color: white;
            padding: 15px 30px;
            border-radius: 15px;
            z-index: 3000;
            transition: var(--transition);
            font-weight: 600;
            box-shadow: 0 8px 24px rgba(0,0,0,0.2);
        }

        #toast.show { transform: translateX(-50%) translateY(0); }

        @media (max-width: 768px) {
            .cart-drawer { width: 100%; }
            .header { height: 70px; }
            .restaurants-grid { grid-template-columns: 1fr; }
            .section-title { font-size: 1.45rem; }
        }
    </style>
</head>
<body>

    <div id="toast">Added to cart!</div>

    <header class="header">
        <div class="logo">VYNIX<span>EATS</span></div>
        <div class="header-actions">
            <button class="cart-btn" onclick="toggleCart()">
                <i data-lucide="shopping-bag"></i>
                <span class="cart-count" id="cartCount">0</span>
            </button>
            <button class="cart-btn" style="background: var(--surface2); color: var(--text);" onclick="showToast('Profile feature coming soon!')">
                <i data-lucide="user"></i>
            </button>
        </div>
    </header>

    <div class="search-section">
        <div class="search-input-wrapper">
            <i data-lucide="search" class="search-icon"></i>
            <input type="text" class="search-input" placeholder="Search restaurants or dishes..." oninput="handleSearch(this.value)">
        </div>
    </div>

    <div class="filters-wrap">
        <div class="filters-scroll no-scrollbar">
            <button class="cat-btn active" onclick="filterCategory('all', this)">🍽️ All</button>
            <button class="cat-btn" onclick="filterCategory('pizza', this)">🍕 Pizza</button>
            <button class="cat-btn" onclick="filterCategory('burgers', this)">🍔 Burgers</button>
            <button class="cat-btn" onclick="filterCategory('sushi', this)">🍣 Sushi</button>
            <button class="cat-btn" onclick="filterCategory('healthy', this)">🥗 Healthy</button>
            <button class="cat-btn" onclick="filterCategory('desserts', this)">🍰 Desserts</button>
            <button class="cat-btn" onclick="filterCategory('indian', this)">🍛 Indian</button>
            <button class="cat-btn" onclick="filterCategory('italian', this)">🍝 Italian</button>
        </div>
    </div>

    <main class="main">
        <h2 class="section-title">Popular Near You</h2>
        <div class="restaurants-grid" id="restaurantsGrid"></div>
    </main>

    <div class="cart-drawer" id="cartDrawer">
        <div class="cart-header">
            <h3 style="font-weight: 800;">Your Cart</h3>
            <button onclick="toggleCart()" style="background:none;border:none;cursor:pointer;font-size:1.5rem;color:var(--dim);">
                <i data-lucide="x"></i>
            </button>
        </div>
        <div class="cart-body" id="cartBody">
            <p style="text-align:center;color:var(--dim);margin-top:80px;">Your cart is empty</p>
        </div>
        <div class="cart-footer">
            <div style="display:flex;justify-content:space-between;margin-bottom:24px;font-size:1.1rem;">
                <span style="color:var(--dim);font-weight:600;">Total</span>
                <span id="cartTotal" style="font-weight:800;">R 0.00</span>
            </div>
            <button class="checkout-btn" id="checkoutBtn" disabled onclick="showToast('Order processing...')">Checkout</button>
        </div>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js";
        import { getDatabase, ref, onValue } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-database.js";

        const firebaseConfig = {
            apiKey: "AIzaSyAxBT0oESoL62oz_x_Z8cMtdENWZPx4tMI",
            authDomain: "pinotp-d7ef5.firebaseapp.com",
            databaseURL: "https://pinotp-d7ef5-default-rtdb.firebaseio.com",
            projectId: "pinotp-d7ef5",
            storageBucket: "pinotp-d7ef5.firebasestorage.app",
            messagingSenderId: "708458917827",
            appId: "1:708458917827:web:375de278577df0adcf9776"
        };

        const app = initializeApp(firebaseConfig);
        const db = getDatabase(app);

        // State
        let allVendors = [];
        let cart = [];
        let currentFilter = 'all';
        let searchTerm = "";

        const cuisineEmoji = {
            pizza: "🍕", burgers: "🍔", sushi: "🍣", indian: "🍛",
            healthy: "🥗", desserts: "🍰", fastfood: "🍟", coffee: "☕",
            steak: "🥩", italian: "🍝", mexican: "🌮", default: "🍽️"
        };

        function getCuisineEmoji(cuisine) {
            if (!cuisine) return "🍽️";
            const lower = cuisine.toLowerCase();
            for (const [key, emoji] of Object.entries(cuisineEmoji)) {
                if (lower.includes(key)) return emoji;
            }
            return "🍽️";
        }

        function mapCategory(cuisine = "") {
            const lower = cuisine.toLowerCase();
            if (lower.includes("pizza")) return "pizza";
            if (lower.includes("burger")) return "burgers";
            if (lower.includes("sushi")) return "sushi";
            if (lower.includes("indian") || lower.includes("curry")) return "indian";
            if (lower.includes("healthy") || lower.includes("salad")) return "healthy";
            if (lower.includes("dessert") || lower.includes("sweet")) return "desserts";
            if (lower.includes("italian") || lower.includes("pasta")) return "italian";
            return "all";
        }

        function loadVendors() {
            onValue(ref(db, "vendors"), (snapshot) => {
                const data = snapshot.val();
                allVendors = [];

                if (data) {
                    Object.entries(data).forEach(([key, v]) => {
                        if (v.status === "active") {
                            allVendors.push({
                                key,
                                name: v.name || "Unnamed Restaurant",
                                cuisine: v.cuisine || "Various",
                                image: v.imageURL || `https://images.unsplash.com/photo-1555396273-367ea4eb4db5?w=800`,
                                eta: v.deliveryTime || "20-35",
                                rating: v.rating || (4.3 + Math.random() * 0.6).toFixed(1),
                                deliveryFee: v.deliveryFee || 20,
                                minOrder: v.minOrder || 50,
                                category: mapCategory(v.cuisine),
                                featured: v.featured === true
                            });
                        }
                    });
                }

                // Optional: sort newest first if createdAt exists
                allVendors.sort((a, b) => (b.createdAt || 0) - (a.createdAt || 0));

                applyFilters();
            });
        }

        function applyFilters() {
            let filtered = allVendors;

            if (currentFilter !== 'all') {
                filtered = filtered.filter(v => v.category === currentFilter);
            }

            if (searchTerm.trim()) {
                const term = searchTerm.toLowerCase().trim();
                filtered = filtered.filter(v => v.name.toLowerCase().includes(term));
            }

            renderRestaurants(filtered);
        }

        function renderRestaurants(vendors) {
            const grid = document.getElementById("restaurantsGrid");

            if (!vendors.length) {
                grid.innerHTML = `<p style="grid-column:1/-1;text-align:center;padding:80px;color:var(--dim);font-size:1.1rem;">
                    No restaurants found. Try another category or search term.
                </p>`;
                return;
            }

            grid.innerHTML = vendors.map(v => `
                <div class="r-card" onclick="showToast('Opening ${v.name} menu... (menu view coming soon)')">
                    <div class="r-img-wrap">
                        <img src="${v.image}" alt="${v.name}" loading="lazy">
                        <div class="r-eta">${v.eta} min</div>
                    </div>
                    <div class="r-info">
                        <div style="display:flex;justify-content:space-between;align-items:start;">
                            <h4 class="r-name">${v.name}</h4>
                            <span style="font-weight:700;color:var(--yellow);">★ ${v.rating}</span>
                        </div>
                        <p class="r-meta">
                            ${v.cuisine} • Delivery R${v.deliveryFee} • Min R${v.minOrder}
                        </p>
                    </div>
                </div>
            `).join('');
        }

        window.filterCategory = (cat, btn) => {
            document.querySelectorAll('.cat-btn').forEach(b => b.classList.remove('active'));
            btn.classList.add('active');
            currentFilter = cat;
            applyFilters();
        };

        window.handleSearch = (value) => {
            searchTerm = value;
            applyFilters();
        };

        // Cart functions (simple version for now)
        window.addToCart = (name, price) => {
            cart.push({ name, price });
            updateCartUI();
            showToast(`Added ${name} • R${price}`);
        };

        function updateCartUI() {
            const body = document.getElementById('cartBody');
            const countEl = document.getElementById('cartCount');
            const totalEl = document.getElementById('cartTotal');
            const checkoutBtn = document.getElementById('checkoutBtn');

            countEl.textContent = cart.length;

            const total = cart.reduce((sum, item) => sum + item.price, 0);
            totalEl.textContent = `R ${total.toFixed(2)}`;

            checkoutBtn.disabled = cart.length === 0;

            if (cart.length === 0) {
                body.innerHTML = `<p style="text-align:center;color:var(--dim);margin-top:80px;font-size:1.1rem;">Your cart is empty</p>`;
            } else {
                body.innerHTML = cart.map(item => `
                    <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:16px;padding:14px;background:var(--surface2);border-radius:16px;">
                        <div>
                            <div style="font-weight:700;">${item.name}</div>
                            <div style="color:var(--dim);font-size:0.9rem;">1 × R${item.price}</div>
                        </div>
                        <div style="font-weight:800;color:var(--accent);">R${item.price}</div>
                    </div>
                `).join('');
            }
        }

        window.toggleCart = () => {
            document.getElementById('cartDrawer').classList.toggle('open');
        };

        window.showToast = (msg) => {
            const toast = document.getElementById('toast');
            toast.textContent = msg;
            toast.classList.add('show');
            setTimeout(() => toast.classList.remove('show'), 3200);
        };

        // Initialize icons & data
        lucide.createIcons();
        loadVendors();
        updateCartUI();
    </script>
</body>
</html>
